[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"

[functions]
  node_bundler = "esbuild"
  directory = "netlify/functions"

[[redirects]]
  from = "/api/auth/register"
  to = "/.netlify/functions/register"
  status = 200

[[redirects]]
  from = "/api/auth/login"
  to = "/.netlify/functions/login"
  status = 200

[[redirects]]
  from = "/api/auth/me"
  to = "/.netlify/functions/me"
  status = 200

[[redirects]]
  from = "/api/auth/logout"
  to = "/.netlify/functions/logout"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200